<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Пространство</title>
    <style>
        :root {
            --primary: #7289da;
            --bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Задний фон с кругами */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }

        /* Главный контейнер */
        .container {
            max-width: 800px;
            width: 90%;
            margin: 50px 0;
            text-align: center;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Ссылка на Дискорд */
        .discord-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(114, 137, 218, 0.4);
        }

        .discord-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(114, 137, 218, 0.6);
        }

        /* Активности */
        .activities {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .activity-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .activity-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }

        /* Стили для мини-игр */
        #click-count { font-size: 2rem; color: #00ffcc; font-weight: bold; }
        #random-color-box { width: 100%; height: 50px; border-radius: 10px; margin-top: 10px; border: 1px solid white; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="orb" style="background: #7289da; top: -50px; left: -50px;"></div>
    <div class="orb" style="background: #ff0080; bottom: -50px; right: -50px;"></div>

    <div class="container">
        <div class="glass-card">
            <h1>Добро пожаловать! 🌌</h1>
            <p>Мы создаем крутое комьюнити. Присоединяйся к нам в Discord!</p>
            <br>
            <a href="https://discord.gg/invite" class="discord-btn" target="_blank">Войти в Discord</a>
        </div>

        <h2>Чем займемся? 🎮</h2>
        
        <div class="activities">
            <div class="activity-card" onclick="clickMe()">
                <h3>Кликер</h3>
                <p>Нажми на меня!</p>
                <div id="click-count">0</div>
            </div>

            <div class="activity-card" onclick="changeColor()">
                <h3>Магия цвета</h3>
                <p>Жми для смены цвета</p>
                <div id="random-color-box"></div>
            </div>

            <div class="activity-card" onclick="askBall()">
                <h3>Шар судьбы</h3>
                <p id="ball-text" style="font-weight: bold; color: #ffcc00;">Нажми для совета</p>
            </div>

            <div class="activity-card" onclick="toggleEmoji()">
                <h3>Настроение</h3>
                <p id="emoji-display" style="font-size: 2.5rem;">🌟</p>
            </div>
        </div>
    </div>

    <script>
        // Логика кликера
        let count = 0;
        function clickMe() {
            count++;
            document.getElementById('click-count').innerText = count;
        }

        // Логика цвета
        function changeColor() {
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FF33A8', '#00FFFF'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('random-color-box').style.backgroundColor = randomColor;
        }

        // Логика предсказателя
        function askBall() {
            const answers = ["Да!", "Возможно", "Нет", "Точно нет", "Спроси позже", "100%", "Маловероятно"];
            const ballText = document.getElementById('ball-text');
            ballText.innerText = answers[Math.floor(Math.random() * answers.length)];
        }

        // Логика эмодзи
        const emojis = ["🔥", "🌈", "🍀", "💎", "👾", "🚀", "😎", "👻"];
        function toggleEmoji() {
            document.getElementById('emoji-display').innerText = emojis[Math.floor(Math.random() * emojis.length)];
        }
    </script>
</body>
</html>
